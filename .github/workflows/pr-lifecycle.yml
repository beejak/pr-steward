name: PR Lifecycle

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    name: Evaluate and apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run lifecycle (policy rollout mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: npm run pr-lifecycle:run
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lifecycle-report
          path: pr-lifecycle-report.json
          if-no-files-found: warn
