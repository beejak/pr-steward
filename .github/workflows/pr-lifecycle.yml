name: PR Lifecycle

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  evaluate:
    name: Evaluate PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run lifecycle (respects policy rollout mode)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run pr-lifecycle:run
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lifecycle-report
          path: pr-lifecycle-report.json
          if-no-files-found: warn

  # Phase 1b: split apply job with pull-requests: write when rollout != dry-run
  apply:
    name: Apply actions
    needs: evaluate
    if: false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - run: echo "Enable when rollout mode is bot-only and evaluate job is validated"
