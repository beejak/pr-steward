rules:
  - id: hardcoded-secret-pattern
    patterns:
      - pattern: |
          $KEY = "..."
        metavariable-regex:
          metavariable: $KEY
          regex: (?i)(api[_-]?key|secret|password|token|auth)
    message: Possible hardcoded secret — use environment variables
    severity: WARNING
    languages: [javascript, typescript, python, generic]

  - id: eval-usage
    patterns:
      - pattern: eval(...)
    message: Avoid eval — injection risk
    severity: ERROR
    languages: [javascript, typescript]
