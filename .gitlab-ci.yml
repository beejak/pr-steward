stages:
  - security
  - lifecycle

security-scan:
  stage: security
  image: node:20
  script:
    - npm ci
    - make security-scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pr-lifecycle-dry-run:
  stage: lifecycle
  image: node:20
  script:
    - npm ci
    - npm run pr-lifecycle:dry-run
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
